name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd /root/courier-shift-bot
          git pull origin main
          npm install --omit=dev
          source venv/bin/activate
          pip install -q torch rapidocr_onnxruntime
          pm2 restart ecosystem.config.js --update-env || pm2 restart courier-shift-bot rapidocr-server

      - name: Check status
        run: pm2 status
