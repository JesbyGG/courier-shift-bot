name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 103.54.19.218
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/courier-shift-bot
            echo '=== git pull ==='
            git pull origin main
            echo '=== npm install ==='
            npm install --omit=dev
            echo '=== python venv bootstrap ==='
            if [ ! -x /root/ocr_venv/bin/python3 ]; then
              echo 'Creating /root/ocr_venv ...'
              apt-get update -qq
              apt-get install -y -qq python3-venv tesseract-ocr tesseract-ocr-rus >/dev/null
              python3 -m venv /root/ocr_venv
              /root/ocr_venv/bin/pip install --quiet --upgrade pip
            fi
            echo '=== python deps install ==='
            /root/ocr_venv/bin/pip install --quiet \
              torch --index-url https://download.pytorch.org/whl/cpu \
              rapidocr_onnxruntime pytesseract opencv-python-headless
            echo '=== pm2 reload ecosystem ==='
            pm2 delete all 2>/dev/null || true
            pm2 start ecosystem.config.js --update-env
            pm2 save
            echo '=== health check ==='
            sleep 5
            pm2 list
            STATUS=$(pm2 jlist 2>/dev/null | node -e "let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>{try{const a=JSON.parse(d); const b=a.find(x=>x.name==='courier-shift-bot'); process.exit(b&&b.pm2_env&&b.pm2_env.status==='online'?0:1)}catch(e){process.exit(2)}})")
            if [ $? -ne 0 ]; then
              echo 'HEALTH CHECK FAILED: courier-shift-bot is not online'
              pm2 logs courier-shift-bot --lines 30 --nostream --raw
              exit 1
            fi
            OCR_STATUS=$(curl -fsS --max-time 5 http://127.0.0.1:9527/health || echo 'UNREACHABLE')
            echo "OCR health: $OCR_STATUS"
            echo '=== deploy complete ==='
