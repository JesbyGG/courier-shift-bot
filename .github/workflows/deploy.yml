name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd ${{ secrets.VPS_PATH }} &&
            git pull origin main &&
            npm install --omit=dev &&
            source venv/bin/activate &&
            pip install -q -r requirements.txt 2>/dev/null || pip install -q rapidocr_onnxruntime &&
            pm2 restart ecosystem.config.js --update-env || pm2 restart courier-shift-bot rapidocr-server
          "

      - name: Check deployment status
        if: failure()
        run: |
          echo "::error::Deployment failed! Check SSH credentials and VPS availability."
          exit 1
